<!DOCTYPE html>
<html>
<head>
  <title>Form Validation</title>
  <style>
button{
	display: block;
	margin: 0 auto;
}
body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 50px;
    }
    label {
      display: inline-block;
      width: calc(4ch + 20px); /* Adjust based on label word length */
      text-align: right;
      margin-right: 10px;
    }
    input[type="text"], input[type="color"] {
      width: calc(20ch + 10px);
      padding: 5px;
    }
  </style>
</head>
<body>

<h2>User Form</h2>

<form id="userForm">
  <div>
    <label for="name">Name:</label>
    <input type="text" id="name">
  </div><br>
  <div>
    <label for="email">Email:</label>
    <input type="text" id="email">
  </div><br>
  <div>
    <label for="mobile">Mobile No:</label>
    <input type="text" id="mobile">
  </div><br>
  <div>
    <span style="margin-right: 10px;">Gender:</span>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
  </div><br>
  <div>
    <label for="color">Favorite Color:</label>
    <input type="color" id="color">
  </div><br>
  <button type="button" onclick="validateForm()">Submit</button>
</form>

<br>

<textarea id="output" rows="6" cols="40" placeholder="User details will appear here" readonly></textarea>

<script>
function validateForm() {
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let mobile = document.getElementById("mobile").value.trim();
    let color = document.getElementById("color").value;

    let genderElements = document.getElementsByName("gender");
    let gender = "";

    for (let g of genderElements) {
        if (g.checked) {
            gender = g.value;
        }
    }

    if (name === "") {
        alert("Name is required");
        return;
    }

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!email.match(emailPattern)) {
        alert("Enter valid email");
        return;
    }

    let mobilePattern = /^[0-9]{10}$/;
    if (!mobile.match(mobilePattern)) {
        alert("Enter valid 10-digit mobile number");
        return;
    }

    if (gender === "") {
        alert("Select gender");
        return;
    }

    let result = "Name: " + name + "\n" +
                 "Email: " + email + "\n" +
                 "Mobile: " + mobile + "\n" +
                 "Gender: " + gender + "\n" +
                 "Favorite Color: " + color;

    document.getElementById("output").value = result;
}
</script>

</body>
</html>
