<! DOCTYPE html>
<html lang="en">
	<head>
		<title>Student Feedback</title>
		<style type="text/css">
			body{
				font-family: Arial,sans-serif;
				margin: 0;
				padding: 0;
				background-color: #f4f4f4;
			}
			h1{
				text-align: center;
				color: #333;
			}
			form {
				max-width: 500px;
				margin: 0 auto;
				background-color: #fff;
				padding: 20px;
				border-radius: 5px;
				box-shadow: 0 0 10px rgba(0,0,0,0.1);
			}
			label{
				display: block;
				margin-bottom: 5px;
				color: #555;
			}
			textarea {
				width:calc(100%-12px);
				padding:7px;
				margin-bottom: 15px;
				border:1px solid #ddd;
				border-radius:2px;
			}
			select {
				width:100%;
				padding:7px;
				margin-bottom: 15px;
				border:1px solid #ddd;
				border-radius: 2px;
			}
			textarea{
				resize:vertical;
			}
			input[type="submit"]{
				background-color:#007bff;
				color: #fff;
				border:none;
				padding: 10px 15px;
				border-radius: 3px;
				cursor:pointer;
			}
			input[type="submit"]:hover{
				background-color:#0056b3;
				transform:scale(1.1);
			}
			footer {
				text-align: center;
				padding:10px;
				background-color:#333;
				color:#fff;
			}
		</style>
	</head>
	<body>
		<h1>Student feedback</h1>
		<form>
			<label>Full Name:</label>
			<input type="text" placeholder= "Your name">
			<label>Email:</label>
			<input type="email" placeholder= "Your email">
			<label>USN:</label>
			<input type="text" placeholder= "Your USN">
			<label>select semester</label>
			<select>
				<option value="1" selected>1</option>
				<option value="2">2</option>
				<option value="3">3</option>
				<option value="4">4</option>
				<option value="5">5</option>
				<option value="6">6</option>
				<option value="7">7</option>
				<option value="8">8</option>
			</select>
			<lable>Branch: </lable>
			<br>
			<input type="radio" value="CS"> CS <br>
			<input type="radio" value="IS"> IS <br>
			<input type="radio" value="CSBS"> CSBS <br>
			<label>Feedback:</label>
			<textarea row="6" cols="50" placeholder="Your Feedback"></textarea>
			<br>
			<input type="checkbox">
			<label>Send a Copy of the feedback</label>
			<br>
			<input type="Submit">
		</form>
	</body>
</html>
